<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nổ Bóng</title>
<link rel="stylesheet" href="/mygames/bubblepop/style.css">
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <div class="title-block">
        <h1>Nổ Bóng</h1>
        <p>Bấm nhóm ≥2 bóng cùng màu để nổ</p>
      </div>
      <div class="scores">
        <div class="score-box">
          <span class="label">Điểm</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="label">Kỷ lục</span>
          <span class="value" id="best">0</span>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <button id="restartBtn" class="restart-btn">↻ Ván mới</button>
    </div>

    <div class="board-outer">
      <div class="board" id="board"></div>
      <div class="overlay hidden" id="overlay">
        <div class="overlay-msg" id="overlayMsg"></div>
        <button class="overlay-btn" id="overlayBtn">Chơi lại</button>
      </div>
    </div>
    <p class="hint">Nhóm càng lớn càng nhiều điểm. Hết nhóm để nổ là kết thúc.</p>
  </div>
<script src="/mygames/bubblepop/game.js"></script>
</body>
</html>
