<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lật Hình Tìm Cặp</title>
<link rel="stylesheet" href="/mygames/memory/style.css">
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <div class="title-block">
        <h1>Lật Hình</h1>
        <p>Nhớ vị trí, lật đúng từng cặp giống nhau</p>
      </div>
      <div class="scores">
        <div class="score-box">
          <span class="label">Lượt lật</span>
          <span class="value" id="moves">0</span>
        </div>
        <div class="score-box">
          <span class="label">Kỷ lục</span>
          <span class="value" id="best">—</span>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <button id="restartBtn" class="restart-btn">↻ Chơi lại</button>
    </div>

    <div class="board-outer">
      <div class="board" id="board"></div>
      <div class="overlay hidden" id="overlay">
        <div class="overlay-msg" id="overlayMsg"></div>
        <button class="overlay-btn" id="overlayBtn">Chơi lại</button>
      </div>
    </div>
    <p class="hint">Bấm vào 2 ô để lật, tìm đủ 8 cặp giống nhau.</p>
  </div>
<script src="/mygames/memory/game.js"></script>
</body>
</html>
